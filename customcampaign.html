<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="icon" href="/favicon.ico" />
    <meta charset="UTF-8">
    <meta name="viewport" content="initial-scale=1">
    <title>KTANE Custom Campaign</title>
  </head>
  <style>
    @font-face {
      font-family: 'Inter';
      src: url(font/Inter_18pt-Medium.ttf);
    }

    body {
      background-color: #411A1A;
      font-size: 24px;
      margin-left: 160px;
      margin-right: 160px;
    }

    p, ul, a {
      font-family: 'Inter', Arial, sans-serif;
      color: white;
    }

    div.apCheck {
      position: fixed;
      top: 0px;
      right: 16px;
    }

    .version, .infoDoc {
      position: fixed;
      bottom: 16px;
      opacity: 60%;
    }

    .version { right: 16px; }
    .infoDoc { left: 16px; }

    table { table-layout: fixed; }
    
    tr { 
      height: 28px; 
      margin-top: 0px;
    }
    td { max-width: 500px; }
    th { 
      width: 125px; 
      max-width: 125px; 
    }

    p.tiny, a.tiny { 
      font-size: 16px;
      margin: 0px;
    }
    p.explain { 
      border-bottom: dashed 1px; 
      cursor: help;
    }

    input#moduleCounts { width: 492px; }

    input.checkbox {
      width: 3em;
      height: 3em;
      margin: 1em;
      margin-left: 2em;
      margin-top: -20px;
    }

    button { font-family: 'Inter', Verdana, sans-serif }

    p#bombTotal {
      overflow: visible;
      white-space: nowrap;
    }

    div.bomb {
      border-style: solid;
      border-color: gray;
      width: 800px;
      margin-top: 0.5em;
    }

    p.bombTitle { 
      text-decoration: underline; 
      margin: 16px;
      margin-bottom: -6px;
    }

    p.freeplayNote { 
      margin-top: 8px;
      margin-left: 16px; 
      margin-bottom: 8px;
    }
    
    ul { 
      font-size: 20px; 
      margin: 12px;
      margin-top: 0px;
      margin-bottom: 30px;
    }

    button.dmgButton { 
      margin: 1em;
      margin-left: 1.1em;
    }
    
    button.big { 
      margin-top: 12px;
      font-size: 24px; 
    }
  </style>
  <body>
    <div id="restorePreviousSession"></div>
    <p id="repoWait">Waiting for Repository of Manual Pages...</p>
    <p id="appStatus">Please input your profile.</p>
    <table>
        <tr>
          <th><p class="tiny explain" title="The file containing information on which modules you're familiar with.&#xa;All modules chosen for the campaign will come from enabled modules in your profile.">KTANE Profile</p></th>
          <td style="background-color: #999999;"><input type="file" accept="application/json" id="profileInput"/></td>
          <th><p class="tiny explain" title="Check this box to include vanilla modules.">Add vanillas?</p></th>
          <td><input onchange="vanillasToggle()" id="vanillasCheck" type="checkbox" disabled unchecked></td>
          <!--
          <th><p class="tiny explain" title="Check this box to include needy modules from your profile.">Use needies?</p></th>
          <td><input onchange="needyToggle()" id="neediesCheck" type="checkbox" disabled unchecked></td>
          -->
        </tr>
        <tr>
          <th><p class="tiny explain" title="Comma separated numbers that dictate the number of modules per bomb.&#xa;Any sequence of non-negative numbers is valid.">Module Counts</p></th>
          <td><input id="moduleCounts" type="text"><p id="bombTotal" class="tiny">(12 bombs, 53 modules total)</p></td>
        </tr>
        <tr>
          <th><p class="tiny explain" title="The number used to 'randomly' generate your campaign.&#xa;So long as you ensure the all parameters match, not just the seed, the generated campaign will be the same.">Seed Value</p></th>
          <td><input id="seedValue" type="text"> <button id="random">Randomize</button> <button id="setToDate">Set to date</button> </td>
        </tr>
    </table>
    <button id="generateCampaign" class="big">Generate Campaign</button>
    <div id="apStuffs"></div>
    <div id="campaign"></div>
    <div class="apCheck"> <p>Archipelago Mode</p> <input onclick="apToggle()" type="checkbox" class="checkbox" id="apCheckbox" style="margin-left: 6em;"></div>
    <a id="infoDoc" class="tiny infoDoc" href="https://blananas2.github.io/ktane-CustomCampaign/">Information Page</a>
    <a id="version" class="tiny version" href="https://github.com/Blananas2/ktane-CustomCampaign/commits/main/">version name-0</a>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src='apfilegen.js'></script>
  <script>
    const CUSTOM_CAMPAIGN_VERSION = "alfa-6";

    const rpsDiv = document.getElementById("restorePreviousSession");
    const apCheckbox = document.getElementById("apCheckbox");
    const appStatus = document.getElementById("appStatus");
    const profileInput = document.getElementById("profileInput");
    const vanillaCheckbox = document.getElementById("vanillasCheck");
    const modCountField = document.getElementById("moduleCounts");
    const seedValueField = document.getElementById("seedValue");
    const randomButton = document.getElementById("random");
    const setToDateButton = document.getElementById("setToDate");
    const generateCampaignButton = document.getElementById("generateCampaign");
    const campaignDiv = document.getElementById("campaign");
    const versionNumber = document.getElementById("version");

    const NATO = [ "Alfa", "Bravo", "Charlie", "Delta", "Echo", "Foxtrot", "Golf", "Hotel", "India", "Juliett", "Kilo", "Lima", "Mike", "November", "Oscar", "Papa", "Quebec", "Romeo", "Sierra", "Tango", "Uniform", "Victor", "Whiskey", "X-ray", "Yankee", "Zulu" ];
    let apMode = apCheckbox.checked;
    let repoFetched = false;
    let ktaneJson;
    let ktaneModules = [];
    let jsonValidated = false;
    let profileModules;
    let vanillasRequested = false;

    let campaign;
    let freeplay = null;
    let overall;
    let generatedPreviously = false;
    let dmgStrings = [[], []];
    let bombDivs;
    let furthestBomb;

    window.addEventListener("pageshow", () => {
      profileInput.value = "";
      vanillaCheckbox.disabled = true;
      vanillaCheckbox.checked = false;
    });

    function apToggle() { apMode = apCheckbox.checked; }
    function vanillasToggle() { 
      vanillasRequested = vanillaCheckbox.checked; 
      if (vanillasRequested) {
        profileModules.push("BigButton", "Venn", "Keypad", "Maze", "Memory", "Morse", "Password", "Simon", "WhosOnFirst", "WireSequence", "Wires");
      } else {
        profileModules.splice(profileModules.length - 11, 11);
      }
      appStatus.textContent = `Profile contains ${profileModules.length} enabled modules.`;
    }

    modCountField.value = "3, 3, 6, 4, 3, 3, 3, 4, 5, 5, 6, 8"; //Based on first 3 sections in vanilla
    seedValueField.value = RNG(4294967296);

    versionNumber.innerHTML = `version ${CUSTOM_CAMPAIGN_VERSION}`;

    fetchRepoData();

    async function fetchRepoData() {
      let request = await fetch("https://ktane.timwi.de/json/raw");
      ktaneJson = JSON.parse(await request.text()).KtaneModules;

      ktaneJson.forEach(entry => {
        if ((entry.Type === "Regular" || entry.Type === "Needy")) {
          ktaneModules.push([entry.ModuleID, entry.Name]);
        }
      });

      repoFetched = true;
      document.getElementById("repoWait").remove();
      checkLocalStorage();
    }

    function checkLocalStorage() {
      if (localStorage.getItem("Seed value")) {
        let rpsButton = document.createElement("button");
        rpsButton.addEventListener("click", (event) => { retrieveLocalStorage(); });
        rpsButton.innerText = "Restore Previous Session";
        rpsButton.classList.add("big");
        rpsDiv.appendChild(rpsButton);
        let dismissButton = document.createElement("button");
        dismissButton.addEventListener("click", (event) => { 
          rpsDiv.innerHTML = ""; 
          if (appStatus.textContent == "Click the above button to restore previous session info.") { appStatus.textContent = "Please input a profile." }
        });
        dismissButton.innerText = "Dismiss";
        dismissButton.style = "margin-left: 12px;";
        rpsDiv.appendChild(dismissButton);
        appStatus.textContent = "Click the above button to restore previous session info.";
      }
    }

    function retrieveLocalStorage() {
      apMode = localStorage.getItem("Archipelago mode") == "true";
      profileModules = JSON.parse(localStorage.getItem("Profile-enabled modules"))
      modCountField.value = localStorage.getItem("Module counts");
      seedValueField.value = localStorage.getItem("Seed value");
      campaign = JSON.parse(localStorage.getItem("Generated campaign"));
      try { freeplay = JSON.parse(localStorage.getItem("Generated freeplay"));
      } catch { freeplay = null; }
      furthestBomb = localStorage.getItem("Furthest bomb");

      vanillaCheckbox.disabled = false;
      if (profileModules.includes("Venn")) { 
        vanillaCheckbox.checked = true;
        vanillasRequested = true;
      }
      apCheckbox.checked = apMode;
      createDMGStrings();
      visualizeCampaign(true);
      appStatus.textContent = `Restored campaign from profile with ${profileModules.length} enabled modules.`;
      rpsDiv.innerHTML = "";
    }

    profileInput.addEventListener("change", (event) => {
      const file = event.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = (e) => {
        const content = e.target.result;
        const data = JSON.parse(content);
        checkJson(data);
      };

      reader.readAsText(file);
    });

    function checkJson(file) {
      if (Object.hasOwn(file, "Operation") && Object.hasOwn(file, "EnabledList")) {
        profileModules = file.EnabledList;
        appStatus.textContent = `Profile contains ${profileModules.length} enabled modules.`;
        jsonValidated = profileModules.length > 0;
        vanillaCheckbox.disabled = false;
      } else if (Object.hasOwn(file, "Operation") && Object.hasOwn(file, "DisabledList")) {
        appStatus.textContent = "Your profile needs to be an Expert profile.";
        jsonValidated = false;
      } else {
        appStatus.textContent = "JSON file does not look like a KTANE profile.";
        jsonValidated = false;
      }
    }

    modCountField.addEventListener("input", (event) => {
      let moduleTotal = sum(modCountField.value.replaceAll(/\s/g, "").split(',').map((v) => isNaN(Number.parseInt(v)) ? 0 : Number.parseInt(v)));
      document.getElementById("bombTotal").innerText = `(${modCountField.value.split(',').length} bombs, ${moduleTotal} modules total)`;
    });

    randomButton.addEventListener("click", (event) => {
      seedValueField.value = RNG(4294967296);
    });

    setToDateButton.addEventListener("click", (event) => {
      let now = new Date();
      seedValueField.value = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2, "0")}${now.getDate().toString().padStart(2, "0")}`;
    });

    generateCampaignButton.addEventListener("click", (event) => {
      if (jsonValidated && repoFetched) {
        if (generatedPreviously) {
          if (!window.confirm("Are you sure you want to generate another campaign? The current campaign will be overwritten.")) { return; }
        }
        rpsDiv.innerHTML = "";

        let countsString = modCountField.value;
        if (countsString.match(/^\d+(,\s*\d+)*$/)) {
          campaign = [];

          let seed = stringToSeed(seedValueField.value);
          let PRNG = mulberry32(seed);

          let actualBombs = 0;
          countsString = countsString.replaceAll(/\s/g, "").split(',');
          countsString.forEach(number => {
            let bomb = [];
            for (let n = 0; n < number; n++) {
              bomb.push(profileModules[PRNG(profileModules.length)]);
            }
            campaign.push(bomb);
            if (number > 0) { actualBombs++ }
          });
          if (apMode) { 
            if (actualBombs < 2) {
              appStatus.textContent = "Campaign should have at least 2 bombs.";
              return;
            }
            calculateLogicPath(); 
          };
          createDMGStrings();
          visualizeCampaign(false);
          bulkSetLocalStorage();
          if (apMode) { doAPStuffs(); }
          generatedPreviously = true;
        } else { appStatus.textContent = "Can't parse the module counts."; }
      } else { appStatus.textContent = "Can't generate without a KTANE profile."; }
    });

    function calculateLogicPath() {
      freeplay = [];
      overall = [ "Bomb Alfa" ];
      let noDupes = campaign.map((bomb) => [...new Set(bomb)]);
      let checkTotals = campaign.map((bomb) => bomb.length + 1);
      let stripped = [...noDupes];

      let modulesInLogic = noDupes[0];
      let bombOrder = [ 0 ];
      let checksToSpend = checkTotals[0];

      while (bombOrder.length < campaign.length) {
        let logicSet = new Set(modulesInLogic);
        stripped = stripped.map((bomb) => bomb.filter((mod) => !logicSet.has(mod)));

        let belowThresh = stripped.findIndex((bomb, ix) => (!bombOrder.includes(ix)) && (bomb.length <= checksToSpend));
        if (belowThresh != -1) {
          bombOrder.push(belowThresh);
          checksToSpend -= stripped[belowThresh].length;
          checksToSpend += checkTotals[belowThresh];
          overall.push(`Bomb ${natoExcel(belowThresh + 1)}`);
        } else {
          let adapted = stripped.map((bomb, ix) => bomb.length + (bombOrder.includes(ix) ? Number.MAX_SAFE_INTEGER : 0));
          let minimum = Math.min(...adapted);
          let freeplayNumbers = findFreeplayNumbers(checksToSpend, minimum);
          let minimumInPlay = stripped.findIndex((bomb, ix) => (!bombOrder.includes(ix)) && bomb.length == minimum);
          bombOrder.push(minimumInPlay);
          checksToSpend = checkTotals[minimumInPlay];
          let freeplayModules = stripped[bombOrder[bombOrder.length - 1]];
          freeplayNumbers.forEach(n => { 
            freeplay.push(freeplayModules.splice(0, n));
            overall.push(`Freeplay #${freeplay.length}`);
          });
          overall.push(`Bomb ${natoExcel(minimumInPlay + 1)}`);
        }
        modulesInLogic.push(...stripped[bombOrder[bombOrder.length - 1]]);
      }
    }

    function findFreeplayNumbers(start, desired) {
      /* SIDENOTE: This function is not perfect, as (3 9) can become (3 <4> 9) as 3 sends 4 and <4> sends 5 which is enough for 9.
      The current function does not calculate this better solution. Would likely require a complete rewrite, but it works for now. */
      let seq = [start];
      let total = start;
      let curNum = start + 1;
      while ((total + curNum) < desired) {
        seq.push(curNum);
        total += curNum;
        curNum++;
      }
      if (total != desired) {
        seq.push(desired - total);
      }

      return seq.sort((a, b) => a - b);
    }

    function createDMGStrings() {
      dmgStrings = [[], []];
      campaign.forEach((bomb, ix) => {
        let dmgString = `////Bomb ${natoExcel(ix + 1)}\n\nmode:normal nopacing ${(bomb.length)*2}:00 5X\n\n`;
        dmgString += bomb.join("\n");
        dmgStrings[0].push(dmgString);
      });
      if (freeplay != undefined) {
        freeplay.forEach((bomb, ix) => {
          let dmgString = `////Freeplay #${ix + 1}\n\nmode:normal nopacing ${(bomb.length)*2}:00 5X\n\n`;
          dmgString += bomb.join("\n");
          dmgStrings[1].push(dmgString);
        });
      }
    }

    function visualizeCampaign(restored) {
      campaignDiv.innerHTML = "";

      let currentFp = 0;

      if (apMode && freeplay.length != 0) {
        let bombDiv = document.createElement("div");
        bombDiv.classList.add("bomb");

        let bombTitle = document.createElement("p");
        bombTitle.textContent = "Freeplay #1";
        bombTitle.classList.add("bombTitle");
        bombDiv.appendChild(bombTitle);

        let prevButton = document.createElement("button");
        prevButton.classList.add("dmgButton");
        prevButton.innerText = "Prev.";
        bombDiv.appendChild(prevButton);
        let nextButton = document.createElement("button");
        nextButton.classList.add("dmgButton");
        nextButton.innerText = "Next";
        bombDiv.appendChild(nextButton);

        let fpNote = document.createElement("p");
        fpNote.textContent = "You can only access this bomb if all modules below are unlocked:";
        fpNote.classList.add("tiny", "freeplayNote");
        bombDiv.appendChild(fpNote);

        let listUl = document.createElement("ul");
        listUl.id = "freeplayList";
        populateFreeplayList(listUl, 0);
        bombDiv.appendChild(listUl);

        prevButton.addEventListener("click", () => {
          let ul = document.getElementById("freeplayList");
          if (currentFp != 0) {
            currentFp--;
            bombTitle.textContent = `Freeplay #${currentFp + 1}`;
            ul.innerHTML = "";
            populateFreeplayList(ul, currentFp);
          }
        });
        nextButton.addEventListener("click", () => {
          let ul = document.getElementById("freeplayList");
          if (currentFp != freeplay.length - 1) {
            currentFp++;
            bombTitle.textContent = `Freeplay #${currentFp + 1}`;
            ul.innerHTML = "";
            populateFreeplayList(ul, currentFp);
          }
        });

        let dmgButton = document.createElement("button");
        dmgButton.classList.add("dmgButton");
        dmgButton.addEventListener("click", () => {
          writeClipboardText(dmgStrings[1][currentFp]);
        });
        dmgButton.innerText = "Copy DMG String";
        bombDiv.appendChild(dmgButton);

        campaignDiv.appendChild(bombDiv);
      }

      function populateFreeplayList(u, n) {
        freeplay[n].forEach(module => {
          let moduleLi = document.createElement("li");
          moduleLi.textContent = moduleIdToName(module);
          u.appendChild(moduleLi);
        });
      }

      bombDivs = [];
      let bombCount = 1;

      campaign.forEach(bomb => {
        let bombDiv = document.createElement("div");
        let modulesUl = document.createElement("ul");
        let bombTitle = document.createElement("p");
        bombDiv.classList.add("bomb");
        
        bombTitle.textContent = `Bomb ${natoExcel(bombCount++)}`;
        bombTitle.classList.add("bombTitle");
        bombDiv.appendChild(bombTitle);

        let currentTotal = bombDivs.length;

        let dmgButton = document.createElement("button");
        dmgButton.classList.add("dmgButton");
        dmgButton.addEventListener("click", () => {
          writeClipboardText(dmgStrings[0][currentTotal]);
        });
        dmgButton.innerText = "Copy DMG String";
        bombDiv.appendChild(dmgButton);

        if (!apMode) {
          bomb.forEach(module => {
            let moduleName = moduleIdToName(module);
            let moduleLi = document.createElement("li");
            moduleLi.textContent = moduleName;
            modulesUl.appendChild(moduleLi);
          });
          bombDiv.appendChild(modulesUl);

          let checkbox = document.createElement("input");
          checkbox.classList.add("checkbox");
          checkbox.type = "checkbox";
          if (restored && currentTotal < furthestBomb - 1) { checkbox.checked = true; }
          checkbox.addEventListener("change", () => {
            try {
              if (campaignDiv.getElementsByTagName('div').length == currentTotal + 1) { 
                campaignDiv.appendChild(bombDivs[currentTotal + 1]);
                localStorage.setItem("Furthest bomb", currentTotal + 2);
              } 
            } catch {
              document.body.style.backgroundColor = "#1A411A";
              appStatus.textContent = "Congratulations! Press the button above to clear the session from memory.";
              let clearButton = document.createElement("button");
              clearButton.addEventListener("click", () => {
                localStorage.clear();
                rpsDiv.innerHTML = "";
                campaignDiv.innerHTML = "";
                document.body.style.backgroundColor = "#411A1A";
                appStatus.textContent = "Previous session data cleared.";
              });
              clearButton.innerText = "Clear session data";
              rpsDiv.appendChild(clearButton);
            }
          });
          bombDiv.appendChild(checkbox);
        }

        bombDivs.push(bombDiv);
        if (restored) {
          if (((currentTotal + 1) <= furthestBomb) || apMode) { campaignDiv.appendChild(bombDiv); }
        } else {
          if (apMode || (currentTotal + 1) == 1) { campaignDiv.appendChild(bombDiv); }
        }
      });

      if (apMode) {
        let clearButton = document.createElement("button");
        clearButton.addEventListener("click", () => {
          if (window.confirm("Are you sure you would like to clear the Archipelago campaign? You will need to recreate the input exactly to get this campaign info back.")) {
            localStorage.clear();
            campaignDiv.innerHTML = "";
            appStatus.textContent = "Campaign data cleared.";
          }
        });
        clearButton.innerText = "Clear campaign";
        clearButton.classList.add("big");
        campaignDiv.appendChild(clearButton);
      }

      if (!restored) { localStorage.setItem("Furthest bomb", apMode ? -1 : 1); }
    }

    function bulkSetLocalStorage() {
      localStorage.setItem("Archipelago mode", apMode);
      localStorage.setItem("Profile-enabled modules", JSON.stringify(profileModules));
      localStorage.setItem("Module counts", modCountField.value);
      localStorage.setItem("Seed value", seedValueField.value);
      localStorage.setItem("Generated campaign", JSON.stringify(campaign));
      localStorage.setItem("Generated freeplay", JSON.stringify(freeplay));
    }

    function doAPStuffs() {
      let apDiv = document.getElementById("apStuffs");
      apDiv.innerHTML = "";

      let table = document.createElement("table");

      let slotTr = document.createElement("tr");
      let slotTh = document.createElement("th");
      let slotP = document.createElement("p");
      slotP.innerText = "Slot name";
      slotP.classList.add("tiny", "explain");
      slotP.title = "The name you'll use for identifying your slot in the multiworld.\nYour name is sufficient if this is your only game, but if not you must make all your slot names distinct.\nMust be between 1 and 16 characters.";
      slotTh.appendChild(slotP);
      let slotTd = document.createElement("td");
      let slotBox = document.createElement("input");
      slotBox.type = "text";
      slotBox.maxLength = 16;
      slotBox.id = "slotBox";
      slotTd.appendChild(slotBox);
      slotTr.appendChild(slotTh);
      slotTr.appendChild(slotTd);
      table.appendChild(slotTr);

      let deathlinkTr = document.createElement("tr");
      let deathlinkTh = document.createElement("th");
      let deathlinkP = document.createElement("p");
      deathlinkP.innerText = "Deathlink?";
      deathlinkP.classList.add("tiny", "explain");
      deathlinkP.title = "Check this box to enable deathlink.\nIf deathlink is enabled, whenever you explode, everyone else with deathlink dies too!\nOh, and if you recieve a deathlink, detonate your bomb!\nDon't forget to send deathlinks when you explode!";
      deathlinkTh.appendChild(deathlinkP);
      let deathlinkTd = document.createElement("td");
      let deathlinkCheckbox = document.createElement("input");
      deathlinkCheckbox.type = "checkbox";
      deathlinkTd.appendChild(deathlinkCheckbox);
      deathlinkTr.appendChild(deathlinkTh);
      deathlinkTr.appendChild(deathlinkTd);
      table.appendChild(deathlinkTr);

      apDiv.appendChild(table);
      let yamlButton = document.createElement("button");
      let campaignHash = stringToSeed(campaign.toString()).toString(16);
      yamlButton.addEventListener("click", () => {
        let slotName = document.getElementById("slotBox").value;
        if (slotName.length == 0) { appStatus.textContent = "Slot name is empty."; return; }
        if (slotName.match(/^\d+$/g)) { 
          //If you know more about how this is supported by Manual or Archipelago, please do notify me of the source so this can be changed accordingly
          if (!window.confirm("Slot names which are entirely numbers tend to cause problems. Would you like to continue anyway?")) { return; }
        }
        let deathlink = deathlinkCheckbox.checked;
        downloadYAML(slotName, deathlink, campaignHash, CUSTOM_CAMPAIGN_VERSION);
        localStorage.setItem("Downloaded YAML", true);
      });
      yamlButton.innerHTML = "Download YAML";
      apDiv.appendChild(yamlButton);
      let apworldButton = document.createElement("button");
      apworldButton.addEventListener("click", () => {
        let deathlink = deathlinkCheckbox.checked;
        let namedCampaign = [];
        campaign.forEach(bomb => {
          let bombArr = [];
          bomb.forEach(module => { bombArr.push(moduleIdToName(module)); });
          namedCampaign.push(bombArr);
        });
        downloadApworld(deathlink, namedCampaign, campaignHash);
      });
      apworldButton.innerHTML = "Download apworld";
      apDiv.appendChild(apworldButton);
    }

    function moduleIdToName(modId) { return ktaneModules.find((entry) => entry[0] == modId)[1]; }

    function RNG(x) { return Math.floor(Math.random() * x); }

    function stringToSeed(str) {
      let hash = 0;

      for (let i = 0; i < str.length; i++) {
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
      }

      return hash;
    }

    function mulberry32(seed) {
      return function(max) {
        seed |= 0;
        seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        let result = ((t ^ t >>> 14) >>> 0) / 4294967296;

        return Math.floor(result * max);
      };
    }

    async function writeClipboardText(text) { await navigator.clipboard.writeText(text); }
    
    function natoExcel(n) {
